# Render Blueprint — deploys apps/api (web service), apps/web (static site),
# and a free Key Value (Redis-compatible) instance from this one repo.
# See: https://render.com/docs/blueprint-spec
#
# DATABASE_URL is marked `sync: false` — it holds the Supabase DB password, so it's
# entered once in the Render dashboard during blueprint setup, never committed here.

services:
  - type: web
    name: grid-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build --workspace=packages/shared && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: grid-redis
          type: redis
          property: connectionString
      - key: AGE_VERIFICATION_MODE
        value: stub
      - key: PAYMENTS_MODE
        value: stub
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Optional — set these manually in the Render dashboard once Supabase Storage S3
      # credentials exist, to enable photo/video upload. The app runs fine without them.
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: grid-web
    runtime: static
    buildCommand: npm install && npm run build --workspace=packages/shared && npm run build --workspace=apps/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://grid-api-h6xp.onrender.com

  - type: redis
    name: grid-redis
    plan: free
    region: frankfurt
    ipAllowList: []
